<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <defs>
    <!-- Primary vibrant blue-to-cyan gradient matching the original logo -->
    <linearGradient id="primaryGrad" x1="10%" y1="90%" x2="90%" y2="10%">
      <stop offset="0%" stopColor="#0B2F83" />   <!-- Rich Deep Blue -->
      <stop offset="30%" stopColor="#0052C4" />  <!-- Royal Blue -->
      <stop offset="65%" stopColor="#0EA5E9" />  <!-- Sky Blue -->
      <stop offset="100%" stopColor="#00F0FF" /> <!-- Intense Cyan / Teal -->
    </linearGradient>

    <!-- Glowing cyan highlight gradient -->
    <linearGradient id="cyanGlow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stopColor="#0284C7" />
      <stop offset="100%" stopColor="#38BDF8" />
    </linearGradient>

    <!-- Deep contrast shadow gradient -->
    <linearGradient id="shadowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#030712" />   <!-- Near Black -->
      <stop offset="100%" stopColor="#1E3A8A" /> <!-- Deep Navy Blue -->
    </linearGradient>
  </defs>

  <g transform="translate(10, 10) scale(0.93)">
    <!-- 1. LEFT FLUID TECH RIBBONS & SWEEPING BLADES -->
    
    <!-- Outer leftmost blade starting from bottom-left curving to mid-left -->
    <path d="M 45 220 C 30 190 28 145 48 115 C 38 135 32 165 35 195 C 38 215 48 235 60 250 Z" fill="url(#primaryGrad)" opacity="0.8" />

    <!-- Leftmost circuit ribbon with node pointing up-left -->
    <path d="M 65 200 C 45 160 55 120 72 98" stroke="url(#primaryGrad)" strokeWidth="6.5" strokeLinecap="round" fill="none" />
    <circle cx="72" cy="98" r="8.5" fill="url(#primaryGrad)" />

    <!-- Second Leftmost sweeping blade (Large middle wing wrapping over the top) -->
    <path d="M 85 260 C 65 225 55 175 68 130 C 82 85 118 52 162 42 C 202 32 235 40 255 52 C 225 38 185 38 148 58 C 112 78 88 112 80 155 C 72 195 80 235 98 265 Z" fill="url(#primaryGrad)" />

    <!-- Top elegant ribbon curve shaping the C upper crown -->
    <path d="M 162 42 C 205 32 250 48 280 82 C 248 55 205 48 165 62 C 145 69 128 80 115 95 C 125 82 142 70 162 64 Z" fill="url(#cyanGlow)" />
    
    <!-- Inner circuit trace below the upper crown ending with node -->
    <path d="M 190 62 C 220 58 250 68 265 82" stroke="url(#cyanGlow)" strokeWidth="5" strokeLinecap="round" fill="none" />
    <circle cx="265" cy="82" r="7.5" fill="url(#cyanGlow)" />

    <!-- Inner left blade sweeping to the center -->
    <path d="M 112 264 C 98 235 92 200 102 165 C 112 135 132 112 158 98 C 138 112 122 138 118 168 C 112 198 118 232 128 266 Z" fill="url(#shadowGrad)" opacity="0.9" />
    <path d="M 115 265 C 102 236 96 202 105 168 C 115 138 135 115 162 100 C 142 115 125 142 121 171 C 115 201 121 234 131 267 Z" fill="url(#primaryGrad)" />

    <!-- Center shadow swoosh curving towards the middle -->
    <path d="M 132 268 C 122 242 120 212 132 185 C 142 158 165 135 190 122 C 168 135 150 160 142 188 C 135 215 138 242 148 269 Z" fill="url(#shadowGrad)" />

    <!-- 2. RIGHT-HAND COMPLEX CIRCUIT BOARD TRACES (Inside the C) -->
    
    <!-- Central horizontal circuit stem -->
    <path d="M 140 178 C 160 164 185 155 210 155" stroke="url(#primaryGrad)" strokeWidth="6.5" strokeLinecap="round" fill="none" />
    <circle cx="210" cy="155" r="8.5" fill="url(#primaryGrad)" />

    <!-- Upper branch circuit line with node -->
    <path d="M 178 155 L 195 132 L 222 132" stroke="url(#cyanGlow)" strokeWidth="5" strokeLinecap="round" fill="none" />
    <circle cx="222" cy="132" r="7" fill="url(#cyanGlow)" />

    <!-- Bottom-right curving jaw forming the bottom-right sweep of C -->
    <path d="M 148 269 C 185 285 228 280 265 252 C 230 270 190 268 158 254 C 145 248 135 240 128 232 C 135 245 140 258 148 269 Z" fill="url(#primaryGrad)" />

    <!-- Fine circuit traces weaving in the lower right-hand area -->
    <!-- These mimic the exact parallel 45-degree circuit board routing of the uploaded logo -->
    
    <!-- Trace 1 (Topmost of the parallel circuit lines) -->
    <path d="M 175 195 C 188 195 198 188 208 178 L 225 178 L 245 162 L 275 162" stroke="url(#cyanGlow)" strokeWidth="4" strokeLinecap="round" fill="none" />
    <circle cx="275" cy="162" r="6" fill="url(#cyanGlow)" />

    <!-- Trace 2 (Middle parallel circuit line) -->
    <path d="M 185 205 C 198 205 208 198 218 188 L 235 188 L 255 172 L 285 172" stroke="url(#primaryGrad)" strokeWidth="4" strokeLinecap="round" fill="none" />
    <circle cx="285" cy="172" r="6" fill="url(#primaryGrad)" />

    <!-- Trace 3 (Bottom parallel circuit line) -->
    <path d="M 195 215 C 208 215 218 208 228 198 L 242 198 L 260 182 L 278 182" stroke="url(#primaryGrad)" strokeWidth="4" strokeLinecap="round" fill="none" />
    <circle cx="278" cy="182" r="5" fill="url(#primaryGrad)" />

    <!-- Trace 4 (Lowest parallel circuit line) -->
    <path d="M 205 225 C 218 225 226 218 236 208 L 248 208 L 265 192" stroke="url(#shadowGrad)" strokeWidth="4" strokeLinecap="round" fill="none" />
    <circle cx="265" cy="192" r="5" fill="url(#shadowGrad)" />

    <!-- Bottom outer wire circuit track wrapping below the lower jaw -->
    <path d="M 175 264 C 205 274 238 266 262 248" stroke="url(#primaryGrad)" strokeWidth="6" strokeLinecap="round" fill="none" />
    <circle cx="262" cy="248" r="8" fill="url(#primaryGrad)" />
  </g>
</svg>
